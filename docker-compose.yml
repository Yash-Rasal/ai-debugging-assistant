services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      JAVA_OPTS: ${JAVA_OPTS:-}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "5173:80"
